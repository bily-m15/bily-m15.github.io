name: Deploy to Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: deploy
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.pages-deploy.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Inject
        env:
          A7D4E4: ${{ secrets.A7D4E4 }}
          B7198D: ${{ secrets.B7198D }}
        run: |
          sudo chown -R "$(id -u):$(id -g)" ./_site
          python3 -c "
          import pathlib, sys, os
          env_a = os.environ.get('A7D4E4', '')
          env_b = os.environ.get('B7198D', '')
          modified = 0
          for doc in pathlib.Path('_site').rglob('*.html'):
              try:
                  body = doc.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              result = body
              if env_a:
                  result = result.replace('<!-- 96bd39efd9fd064ea8fdf051 -->', env_a)
              if env_b:
                  result = result.replace('<!-- 6d64607b2cf9d9765f5b162964981788b2b1d9145db7 -->', env_b)
              if result != body:
                  doc.write_text(result, encoding='utf-8')
                  modified += 1
          if modified == 0 and (env_a or env_b):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: pages-deploy
        uses: actions/deploy-pages@v4
